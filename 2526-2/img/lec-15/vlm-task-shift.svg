<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#263238}
      .label{font:700 23px Arial,sans-serif;fill:#263238}
      .small{font:18px Arial,sans-serif;fill:#455a64}
      .tiny{font:16px Arial,sans-serif;fill:#607d8b}
      .box{rx:18;fill:#fff;stroke:#cfd8dc;stroke-width:3}
      .blue{fill:#e3f2fd;stroke:#1565c0}
      .green{fill:#e8f5e9;stroke:#2e7d32}
      .orange{fill:#fff3e0;stroke:#ef6c00}
      .red{fill:#ffebee;stroke:#c62828}
      .arrow{stroke:#455a64;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#455a64"/>
    </marker>
  </defs>
  <text x="640" y="48" text-anchor="middle" class="title">Bước chuyển: từ nhãn cố định sang giao tiếp bằng ngôn ngữ</text>

  <rect x="52" y="105" width="320" height="300" class="box blue"/>
  <text x="212" y="148" text-anchor="middle" class="label" fill="#1565c0">Mô hình thị giác truyền thống</text>
  <rect x="102" y="188" width="220" height="96" rx="12" fill="#bbdefb" stroke="#1565c0" stroke-width="3"/>
  <text x="212" y="226" text-anchor="middle" class="label">Ảnh x</text>
  <text x="212" y="256" text-anchor="middle" class="small">ma trận điểm ảnh</text>
  <path d="M212 294 V342" class="arrow"/>
  <rect x="102" y="350" width="220" height="38" rx="8" fill="#fff"/>
  <text x="212" y="375" text-anchor="middle" class="small">nhãn / hộp / mặt nạ</text>
  <text x="212" y="446" text-anchor="middle" class="tiny">Không gian đầu ra được thiết kế trước.</text>

  <path d="M397 255 H500" class="arrow"/>
  <text x="448" y="226" text-anchor="middle" class="small">thêm văn bản</text>

  <rect x="530" y="105" width="700" height="300" class="box green"/>
  <text x="880" y="148" text-anchor="middle" class="label" fill="#2e7d32">Mô hình ngôn ngữ thị giác</text>
  <rect x="575" y="190" width="190" height="86" rx="12" fill="#c8e6c9" stroke="#2e7d32" stroke-width="3"/>
  <text x="670" y="225" text-anchor="middle" class="label">Ảnh</text>
  <text x="670" y="252" text-anchor="middle" class="small">vùng, vật, chữ</text>
  <rect x="575" y="300" width="190" height="86" rx="12" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
  <text x="670" y="335" text-anchor="middle" class="label">Câu hỏi</text>
  <text x="670" y="362" text-anchor="middle" class="small">mô tả, lệnh, truy vấn</text>
  <path d="M790 233 H905" class="arrow"/>
  <path d="M790 343 H905" class="arrow"/>
  <rect x="930" y="204" width="230" height="150" rx="16" fill="#fff" stroke="#2e7d32" stroke-width="3"/>
  <text x="1045" y="245" text-anchor="middle" class="label">Trả lời</text>
  <text x="1045" y="282" text-anchor="middle" class="small">văn bản, vị trí,</text>
  <text x="1045" y="312" text-anchor="middle" class="small">hành động hoặc truy xuất</text>
  <text x="880" y="446" text-anchor="middle" class="tiny">Không gian đầu ra được điều khiển bằng ngôn ngữ tự nhiên.</text>

  <rect x="235" y="485" width="810" height="48" rx="12" class="orange"/>
  <text x="640" y="516" text-anchor="middle" class="small">Điểm mới không phải chỉ là “thêm chữ”, mà là học quan hệ giữa khái niệm thị giác và khái niệm ngôn ngữ.</text>
</svg>
