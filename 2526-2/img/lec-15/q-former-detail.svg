<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="430" viewBox="0 0 1280 430">
  <defs>
    <style>
      .label{font:700 21px Arial,sans-serif;fill:#263238}
      .small{font:17px Arial,sans-serif;fill:#455a64}
      .tiny{font:15px Arial,sans-serif;fill:#607d8b}
      .box{rx:16;fill:#fff;stroke:#cfd8dc;stroke-width:3}
      .blue{fill:#e3f2fd;stroke:#1565c0}
      .purple{fill:#ede7f6;stroke:#5e35b1}
      .green{fill:#e8f5e9;stroke:#2e7d32}
      .orange{fill:#fff3e0;stroke:#ef6c00}
      .arrow{stroke:#455a64;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#455a64"/>
    </marker>
  </defs>

  <rect x="60" y="100" width="190" height="130" class="blue"/>
  <text x="155" y="148" text-anchor="middle" class="label" fill="#1565c0">Token ảnh</text>
  <text x="155" y="181" text-anchor="middle" class="small">\(Z \in R^{N \times d_v}\)</text>
  <text x="155" y="210" text-anchor="middle" class="tiny">từ bộ mã hóa ảnh</text>

  <rect x="60" y="270" width="190" height="95" class="orange"/>
  <text x="155" y="310" text-anchor="middle" class="label" fill="#ef6c00">Truy vấn học được</text>
  <text x="155" y="342" text-anchor="middle" class="small">\(Q_0 \in R^{M \times d}\)</text>

  <path d="M250 165 H355" class="arrow"/>
  <path d="M250 318 C300 318 315 250 355 220" class="arrow"/>

  <rect x="360" y="95" width="295" height="270" class="purple"/>
  <text x="508" y="142" text-anchor="middle" class="label" fill="#5e35b1">Q-Former</text>
  <rect x="415" y="175" width="185" height="44" rx="10" fill="#fff" stroke="#5e35b1" stroke-width="2"/>
  <text x="508" y="203" text-anchor="middle" class="small">tự chú ý giữa truy vấn</text>
  <rect x="415" y="235" width="185" height="44" rx="10" fill="#fff" stroke="#5e35b1" stroke-width="2"/>
  <text x="508" y="263" text-anchor="middle" class="small">chú ý chéo tới ảnh</text>
  <text x="508" y="320" text-anchor="middle" class="tiny">M truy vấn chọn thông tin cần thiết</text>

  <path d="M655 230 H765" class="arrow"/>

  <rect x="770" y="115" width="220" height="230" class="green"/>
  <text x="880" y="162" text-anchor="middle" class="label" fill="#2e7d32">Token truy vấn ra</text>
  <text x="880" y="197" text-anchor="middle" class="small">\(H_q \in R^{M \times d}\)</text>
  <text x="880" y="230" text-anchor="middle" class="small">M nhỏ hơn N</text>
  <text x="880" y="263" text-anchor="middle" class="tiny">đưa sang LLM hoặc loss căn chỉnh</text>

  <path d="M990 230 H1085" class="arrow"/>
  <rect x="1090" y="150" width="135" height="160" class="box"/>
  <text x="1158" y="210" text-anchor="middle" class="label">LLM</text>
  <text x="1158" y="243" text-anchor="middle" class="small">sinh chữ</text>

  <text x="640" y="405" text-anchor="middle" class="small">Truy vấn học được đóng vai trò cổ chai: không truyền toàn bộ ảnh, chỉ truyền phần thông tin Q-Former rút ra.</text>
</svg>
