<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#263238}
      .label{font:700 21px Arial,sans-serif;fill:#263238}
      .small{font:17px Arial,sans-serif;fill:#455a64}
      .celltext{font:700 17px Arial,sans-serif;fill:#263238}
      .axis{font:700 18px Arial,sans-serif;fill:#455a64}
      .arrow{stroke:#455a64;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#455a64"/>
    </marker>
  </defs>
  <text x="640" y="44" text-anchor="middle" class="title">Loss tương phản: một lô học từ N cặp đúng và N² - N cặp sai</text>
  <text x="205" y="102" text-anchor="middle" class="axis">véc-tơ ảnh</text>
  <text x="655" y="102" text-anchor="middle" class="axis">véc-tơ văn bản</text>

  <g transform="translate(120,130)">
    <rect x="0" y="0" width="170" height="60" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
    <text x="85" y="38" text-anchor="middle" class="label">ảnh 1</text>
    <rect x="0" y="78" width="170" height="60" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
    <text x="85" y="116" text-anchor="middle" class="label">ảnh 2</text>
    <rect x="0" y="156" width="170" height="60" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
    <text x="85" y="194" text-anchor="middle" class="label">ảnh 3</text>
    <rect x="0" y="234" width="170" height="60" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
    <text x="85" y="272" text-anchor="middle" class="label">ảnh 4</text>
  </g>
  <g transform="translate(570,130)">
    <rect x="0" y="0" width="170" height="60" rx="10" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
    <text x="85" y="38" text-anchor="middle" class="label">chú thích 1</text>
    <rect x="0" y="78" width="170" height="60" rx="10" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
    <text x="85" y="116" text-anchor="middle" class="label">chú thích 2</text>
    <rect x="0" y="156" width="170" height="60" rx="10" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
    <text x="85" y="194" text-anchor="middle" class="label">chú thích 3</text>
    <rect x="0" y="234" width="170" height="60" rx="10" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
    <text x="85" y="272" text-anchor="middle" class="label">chú thích 4</text>
  </g>
  <path d="M300 270 H490" class="arrow"/>

  <g transform="translate(830,122)">
    <text x="160" y="-20" text-anchor="middle" class="axis">ma trận độ tương đồng</text>
    <rect x="0" y="0" width="320" height="320" fill="#fafafa" stroke="#b0bec5" stroke-width="3"/>
    <g>
      <rect x="0" y="0" width="80" height="80" fill="#c8e6c9"/><text x="40" y="48" text-anchor="middle" class="celltext">cao</text>
      <rect x="80" y="0" width="80" height="80" fill="#ffcdd2"/><text x="120" y="48" text-anchor="middle" class="celltext">thấp</text>
      <rect x="160" y="0" width="80" height="80" fill="#ffcdd2"/><text x="200" y="48" text-anchor="middle" class="celltext">thấp</text>
      <rect x="240" y="0" width="80" height="80" fill="#ffcdd2"/><text x="280" y="48" text-anchor="middle" class="celltext">thấp</text>
      <rect x="0" y="80" width="80" height="80" fill="#ffcdd2"/><rect x="80" y="80" width="80" height="80" fill="#c8e6c9"/><rect x="160" y="80" width="80" height="80" fill="#ffcdd2"/><rect x="240" y="80" width="80" height="80" fill="#ffcdd2"/>
      <rect x="0" y="160" width="80" height="80" fill="#ffcdd2"/><rect x="80" y="160" width="80" height="80" fill="#ffcdd2"/><rect x="160" y="160" width="80" height="80" fill="#c8e6c9"/><rect x="240" y="160" width="80" height="80" fill="#ffcdd2"/>
      <rect x="0" y="240" width="80" height="80" fill="#ffcdd2"/><rect x="80" y="240" width="80" height="80" fill="#ffcdd2"/><rect x="160" y="240" width="80" height="80" fill="#ffcdd2"/><rect x="240" y="240" width="80" height="80" fill="#c8e6c9"/>
    </g>
    <path d="M0 80 H320 M0 160 H320 M0 240 H320 M80 0 V320 M160 0 V320 M240 0 V320" stroke="#fff" stroke-width="3"/>
  </g>

  <text x="640" y="505" text-anchor="middle" class="small">Softmax theo hàng: ảnh chọn đúng chú thích. Softmax theo cột: chú thích chọn đúng ảnh.</text>
