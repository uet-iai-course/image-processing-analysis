<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#263238}
      .label{font:700 21px Arial,sans-serif;fill:#263238}
      .small{font:17px Arial,sans-serif;fill:#455a64}
      .tiny{font:15px Arial,sans-serif;fill:#607d8b}
      .box{rx:15;fill:#fff;stroke:#cfd8dc;stroke-width:3}
      .patch{fill:#bbdefb;stroke:#1565c0;stroke-width:2}
      .token{fill:#e8f5e9;stroke:#2e7d32;stroke-width:3}
      .proj{fill:#ede7f6;stroke:#5e35b1;stroke-width:3}
      .arrow{stroke:#455a64;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#455a64"/>
    </marker>
  </defs>
  <text x="640" y="48" text-anchor="middle" class="title">Token ảnh: ảnh phải được đổi thành chuỗi mà LLM có thể đọc</text>
  <g transform="translate(85,130)">
    <rect x="0" y="0" width="250" height="250" fill="#e3f2fd" stroke="#1565c0" stroke-width="4" rx="14"/>
    <path d="M62.5 0 V250 M125 0 V250 M187.5 0 V250 M0 62.5 H250 M0 125 H250 M0 187.5 H250" class="patch"/>
    <text x="125" y="292" text-anchor="middle" class="small">ảnh chia thành mảnh</text>
  </g>
  <path d="M355 255 H475" class="arrow"/>
  <g transform="translate(500,135)">
    <rect x="0" y="0" width="230" height="240" class="box"/>
    <text x="115" y="42" text-anchor="middle" class="label">Bộ mã hóa ảnh</text>
    <rect x="45" y="78" width="140" height="26" rx="8" class="token"/>
    <rect x="45" y="115" width="140" height="26" rx="8" class="token"/>
    <rect x="45" y="152" width="140" height="26" rx="8" class="token"/>
    <rect x="45" y="189" width="140" height="26" rx="8" class="token"/>
    <text x="115" y="266" text-anchor="middle" class="small">N token, chiều \(d_v\)</text>
  </g>
  <path d="M730 255 H845" class="arrow"/>
  <g transform="translate(870,135)">
    <rect x="0" y="0" width="245" height="240" class="proj"/>
    <text x="122" y="42" text-anchor="middle" class="label" fill="#5e35b1">Bộ chiếu</text>
    <text x="122" y="82" text-anchor="middle" class="small">tuyến tính hoặc MLP</text>
    <text x="122" y="120" text-anchor="middle" class="small">\(d_v \rightarrow d_{llm}\)</text>
    <text x="122" y="158" text-anchor="middle" class="small">có thể giảm số token</text>
    <rect x="55" y="190" width="135" height="28" rx="8" fill="#fff" stroke="#5e35b1" stroke-width="2"/>
    <text x="122" y="211" text-anchor="middle" class="tiny">token hợp chuẩn</text>
  </g>
  <text x="640" y="505" text-anchor="middle" class="small">Nếu cầu chuyển đổi kém, LLM có năng lực ngôn ngữ mạnh nhưng vẫn “nhìn” sai hoặc bỏ sót chi tiết ảnh.</text>
</svg>
