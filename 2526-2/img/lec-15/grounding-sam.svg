<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#263238}
      .label{font:700 21px Arial,sans-serif;fill:#263238}
      .small{font:17px Arial,sans-serif;fill:#455a64}
      .box{rx:16;fill:#fff;stroke:#cfd8dc;stroke-width:3}
      .blue{fill:#e3f2fd;stroke:#1565c0}
      .orange{fill:#fff3e0;stroke:#ef6c00}
      .green{fill:#e8f5e9;stroke:#2e7d32}
      .arrow{stroke:#455a64;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#455a64"/>
    </marker>
  </defs>
  <text x="640" y="48" text-anchor="middle" class="title">Grounding: câu chữ phải bám vào vùng cụ thể trên ảnh</text>
  <rect x="70" y="160" width="230" height="130" class="orange"/>
  <text x="185" y="205" text-anchor="middle" class="label" fill="#ef6c00">Truy vấn</text>
  <text x="185" y="238" text-anchor="middle" class="small">"người cầm ô đỏ"</text>
  <path d="M300 225 H420" class="arrow"/>
  <rect x="425" y="160" width="230" height="130" class="box"/>
  <text x="540" y="205" text-anchor="middle" class="label">Mô hình mở từ vựng</text>
  <text x="540" y="238" text-anchor="middle" class="small">chọn hộp / điểm</text>
  <path d="M655 225 H775" class="arrow"/>
  <rect x="780" y="105" width="360" height="240" class="blue"/>
  <text x="960" y="150" text-anchor="middle" class="label" fill="#1565c0">Ảnh</text>
  <rect x="900" y="180" width="105" height="110" fill="none" stroke="#c62828" stroke-width="5"/>
  <circle cx="952" cy="230" r="7" fill="#c62828"/>
  <text x="960" y="325" text-anchor="middle" class="small">hộp hoặc điểm neo</text>
  <path d="M960 345 V405" class="arrow"/>
  <rect x="790" y="410" width="340" height="90" class="green"/>
  <text x="960" y="446" text-anchor="middle" class="label" fill="#2e7d32">Bộ phân vùng nhắc lệnh</text>
  <text x="960" y="478" text-anchor="middle" class="small">sinh mặt nạ chi tiết</text>
  <text x="430" y="480" text-anchor="middle" class="small">VLM giúp hiểu câu; detector/segmenter giúp định vị chính xác.</text>
</svg>
