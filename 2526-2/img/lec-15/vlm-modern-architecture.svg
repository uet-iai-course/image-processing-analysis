<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#263238}
      .label{font:700 21px Arial,sans-serif;fill:#263238}
      .small{font:17px Arial,sans-serif;fill:#455a64}
      .box{rx:16;fill:#fff;stroke:#cfd8dc;stroke-width:3}
      .blue{fill:#e3f2fd;stroke:#1565c0}
      .purple{fill:#ede7f6;stroke:#5e35b1}
      .green{fill:#e8f5e9;stroke:#2e7d32}
      .orange{fill:#fff3e0;stroke:#ef6c00}
      .arrow{stroke:#455a64;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#455a64"/>
    </marker>
  </defs>
  <text x="640" y="48" text-anchor="middle" class="title">Kiến trúc VLM hiện đại: nối bộ nhìn với LLM bằng một cầu chuyển đổi</text>
  <rect x="60" y="210" width="155" height="110" class="blue"/>
  <text x="138" y="253" text-anchor="middle" class="label" fill="#1565c0">Ảnh</text>
  <text x="138" y="284" text-anchor="middle" class="small">H x W</text>
  <path d="M215 265 H310" class="arrow"/>
  <rect x="315" y="180" width="205" height="170" class="box"/>
  <text x="418" y="238" text-anchor="middle" class="label">Bộ mã hóa ảnh</text>
  <text x="418" y="271" text-anchor="middle" class="small">ViT / CNN</text>
  <text x="418" y="300" text-anchor="middle" class="small">mảnh ảnh → đặc trưng</text>
  <path d="M520 265 H615" class="arrow"/>
  <rect x="620" y="180" width="205" height="170" class="purple"/>
  <text x="722" y="226" text-anchor="middle" class="label" fill="#5e35b1">Bộ chuyển đổi</text>
  <text x="722" y="258" text-anchor="middle" class="small">bộ chiếu / bộ rút gọn</text>
  <text x="722" y="288" text-anchor="middle" class="small">đổi chiều, giảm token</text>
  <text x="722" y="318" text-anchor="middle" class="small">căn với LLM</text>
  <path d="M825 265 H920" class="arrow"/>
  <rect x="925" y="160" width="285" height="210" class="green"/>
  <text x="1068" y="225" text-anchor="middle" class="label" fill="#2e7d32">LLM</text>
  <text x="1068" y="258" text-anchor="middle" class="small">nhận token ảnh</text>
  <text x="1068" y="288" text-anchor="middle" class="small">và token chữ</text>
  <text x="1068" y="318" text-anchor="middle" class="small">sinh câu trả lời</text>
  <rect x="505" y="410" width="270" height="70" class="orange"/>
  <text x="640" y="453" text-anchor="middle" class="label" fill="#ef6c00">Tinh chỉnh theo lệnh dạy mô hình trả lời theo lệnh</text>
</svg>
