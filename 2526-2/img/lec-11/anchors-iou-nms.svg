<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-label="Hộp neo, IoU và NMS">
  <defs>
    <style>
      .h{font:700 27px Arial,sans-serif;fill:#263238;text-anchor:middle}
      .t{font:700 21px Arial,sans-serif;fill:#263238;text-anchor:middle}
      .s{font:17px Arial,sans-serif;fill:#455a64;text-anchor:middle}
      .tiny{font:15px Arial,sans-serif;fill:#607d8b;text-anchor:middle}
      .panel{fill:white;stroke:#cfd8dc;stroke-width:2;rx:12}
      .img{fill:#eceff1;stroke:#b0bec5;stroke-width:2;rx:10}
    </style>
  </defs>
  <rect width="1100" height="560" fill="#fafafa"/>
  <text class="h" x="550" y="42">Ba khái niệm chạy xuyên suốt detector cổ điển</text>

  <g transform="translate(32,82)">
    <rect class="panel" x="0" y="0" width="320" height="410"/>
    <text class="t" x="160" y="38">Hộp neo</text>
    <rect class="img" x="58" y="76" width="204" height="220"/>
    <g stroke="#1565c0" stroke-width="2" opacity="0.38">
      <line x1="109" y1="76" x2="109" y2="296"/><line x1="160" y1="76" x2="160" y2="296"/><line x1="211" y1="76" x2="211" y2="296"/>
      <line x1="58" y1="131" x2="262" y2="131"/><line x1="58" y1="186" x2="262" y2="186"/><line x1="58" y1="241" x2="262" y2="241"/>
    </g>
    <circle cx="160" cy="186" r="5" fill="#1565c0"/>
    <rect x="118" y="146" width="84" height="80" fill="none" stroke="#ef6c00" stroke-width="4"/>
    <rect x="101" y="159" width="118" height="54" fill="none" stroke="#2e7d32" stroke-width="4"/>
    <rect x="137" y="123" width="46" height="126" fill="none" stroke="#7b1fa2" stroke-width="4"/>
    <text class="s" x="160" y="335">Tại mỗi vị trí đặc trưng,</text>
    <text class="s" x="160" y="360">thử nhiều tỉ lệ và kích thước.</text>
  </g>

  <g transform="translate(390,82)">
    <rect class="panel" x="0" y="0" width="320" height="410"/>
    <text class="t" x="160" y="38">IoU</text>
    <rect class="img" x="62" y="80" width="196" height="190"/>
    <rect x="92" y="124" width="102" height="94" fill="#ffcc80" opacity="0.55" stroke="#ef6c00" stroke-width="4"/>
    <rect x="142" y="104" width="96" height="100" fill="#90caf9" opacity="0.55" stroke="#1565c0" stroke-width="4"/>
    <rect x="142" y="124" width="52" height="80" fill="#a5d6a7" opacity="0.8" stroke="#2e7d32" stroke-width="2"/>
    <text class="tiny" x="113" y="238">box thật</text>
    <text class="tiny" x="215" y="94">box dự đoán</text>
    <text class="s" x="160" y="322">IoU = diện tích giao / diện tích hợp</text>
    <text class="s" x="160" y="352">Dùng để gán nhãn hộp neo và đo chất lượng.</text>
  </g>

  <g transform="translate(748,82)">
    <rect class="panel" x="0" y="0" width="320" height="410"/>
    <text class="t" x="160" y="38">NMS</text>
    <rect class="img" x="58" y="76" width="204" height="220"/>
    <ellipse cx="158" cy="177" rx="52" ry="66" fill="#ffe0b2" stroke="#ef6c00" stroke-width="4"/>
    <rect x="92" y="105" width="112" height="136" fill="none" stroke="#c62828" stroke-width="4"/>
    <rect x="104" y="114" width="106" height="126" fill="none" stroke="#1565c0" stroke-width="4" stroke-dasharray="7 6"/>
    <rect x="82" y="98" width="128" height="144" fill="none" stroke="#7b1fa2" stroke-width="4" stroke-dasharray="4 7"/>
    <text class="tiny" x="92" y="94">0.91</text>
    <text class="tiny" x="215" y="110">0.77</text>
    <text class="tiny" x="226" y="245">0.63</text>
    <text class="s" x="160" y="322">Giữ box điểm cao nhất,</text>
    <text class="s" x="160" y="352">loại box cùng lớp có IoU lớn.</text>
  </g>
</svg>
