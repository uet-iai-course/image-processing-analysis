    <text x="75" y="36" text-anchor="middle" font-size="18" font-weight="700" font-family="Arial, sans-serif" fill="#ef6c00">SiamRPN</text>
    <text x="75" y="64" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">điểm + độ lệch</text>
  </g>
  <path d="M730 158 L795 158" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-rpn-inf)"/>
  <g transform="translate(815,94)">
