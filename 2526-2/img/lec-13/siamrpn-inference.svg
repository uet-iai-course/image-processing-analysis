      <path d="M0,0 L9,4.5 L0,9 Z" fill="#455a64"/>
    </marker>
  </defs>
  <rect width="1150" height="430" fill="#ffffff"/>
  <text x="575" y="38" text-anchor="middle" font-size="27" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Suy luận SiamRPN: sinh nhiều hộp, rồi chọn hộp đáng tin nhất</text>

  <g transform="translate(60,110)">
