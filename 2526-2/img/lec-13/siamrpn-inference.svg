    <rect x="34" y="40" width="70" height="44" fill="none" stroke="#7b1fa2" stroke-width="4"/>
    <rect x="44" y="50" width="78" height="54" fill="none" stroke="#ef6c00" stroke-width="4"/>
    <text x="72" y="118" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">nhiều hộp</text>
