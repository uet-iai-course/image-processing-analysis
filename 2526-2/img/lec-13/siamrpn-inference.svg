    <text x="70" y="36" text-anchor="middle" font-size="18" font-weight="700" font-family="Arial, sans-serif" fill="#1565c0">mẫu</text>
    <text x="70" y="64" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">khung đầu</text>
  </g>
  <path d="M220 158 L285 158" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-rpn-inf)"/>
  <g transform="translate(305,110)">
