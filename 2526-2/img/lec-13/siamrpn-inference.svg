    <text x="75" y="36" text-anchor="middle" font-size="18" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">vùng tìm</text>
    <text x="75" y="64" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">quanh vị trí cũ</text>
  </g>
  <path d="M475 158 L540 158" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-rpn-inf)"/>
