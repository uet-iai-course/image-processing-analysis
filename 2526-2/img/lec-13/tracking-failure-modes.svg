<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Các lỗi thường gặp trong bám bắt đối tượng">
  <rect width="1200" height="520" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Các lỗi bám bắt thường gặp đều là lỗi liên kết thời gian</text>

  <g transform="translate(55,90)">
    <rect width="250" height="340" rx="12" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
    <text x="125" y="38" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#c62828">Trôi hộp</text>
    <rect x="50" y="80" width="150" height="110" rx="8" fill="#ffffff" stroke="#cfd8dc"/>
    <rect x="74" y="105" width="70" height="52" fill="none" stroke="#2e7d32" stroke-width="5"/>
    <rect x="104" y="126" width="70" height="52" fill="none" stroke="#c62828" stroke-width="5" stroke-dasharray="8 6"/>
    <text x="125" y="230" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#263238">tracker bám sang nền</text>
    <text x="125" y="258" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#263238">hoặc chi tiết gây nhiễu</text>
  </g>

  <g transform="translate(335,90)">
    <rect width="250" height="340" rx="12" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
    <text x="125" y="38" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#ef6c00">Che khuất</text>
    <rect x="50" y="80" width="150" height="110" rx="8" fill="#ffffff" stroke="#cfd8dc"/>
    <rect x="68" y="112" width="65" height="56" fill="none" stroke="#ef6c00" stroke-width="5"/>
    <rect x="108" y="96" width="72" height="84" rx="6" fill="#90a4ae" opacity="0.7"/>
    <text x="125" y="230" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#263238">đối tượng tạm biến mất</text>
    <text x="125" y="258" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#263238">nhưng danh tính cần giữ</text>
  </g>

  <g transform="translate(615,90)">
    <rect width="250" height="340" rx="12" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
    <text x="125" y="38" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#1565c0">Mất dấu</text>
    <rect x="50" y="80" width="150" height="110" rx="8" fill="#ffffff" stroke="#cfd8dc"/>
    <rect x="56" y="116" width="54" height="44" fill="none" stroke="#1565c0" stroke-width="5"/>
    <path d="M110 138 L180 138" stroke="#1565c0" stroke-width="5" stroke-dasharray="7 6"/>
    <text x="183" y="144" font-size="32" font-family="Arial, sans-serif" fill="#1565c0">?</text>
    <text x="125" y="230" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#263238">detector không thấy vật</text>
    <text x="125" y="258" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#263238">track bị cắt ngắn</text>
  </g>

  <g transform="translate(895,90)">
    <rect width="250" height="340" rx="12" fill="#f3e5f5" stroke="#ce93d8" stroke-width="2"/>
    <text x="125" y="38" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#7b1fa2">Đổi danh tính</text>
    <rect x="50" y="80" width="150" height="110" rx="8" fill="#ffffff" stroke="#cfd8dc"/>
    <rect x="70" y="112" width="50" height="52" fill="none" stroke="#ef6c00" stroke-width="5"/>
    <rect x="130" y="112" width="50" height="52" fill="none" stroke="#7b1fa2" stroke-width="5"/>
    <path d="M94 172 C114 206 148 206 166 172" fill="none" stroke="#c62828" stroke-width="5"/>
    <text x="92" y="103" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#e65100">ID 3</text>
    <text x="156" y="103" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#4a148c">ID 8</text>
    <text x="125" y="230" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#263238">hai track hoán đổi ID</text>
    <text x="125" y="258" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#263238">khi đi sát nhau</text>
  </g>

  <text x="600" y="482" text-anchor="middle" font-size="21" font-family="Arial, sans-serif" fill="#455a64">Một tracker tốt không chỉ định vị chính xác; nó phải giữ đúng danh tính qua nhiễu, che khuất và phát hiện thiếu.</text>
</svg>
