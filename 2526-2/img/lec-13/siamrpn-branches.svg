<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-label="Hai nhánh phân loại và hồi quy trong SiamRPN">
  <defs>
    <marker id="arrow-rpn-branch" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#455a64"/>
    </marker>
  </defs>
  <rect width="1120" height="430" fill="#ffffff"/>
  <text x="560" y="38" text-anchor="middle" font-size="27" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Một cặp đặc trưng, hai câu hỏi khác nhau</text>

  <g transform="translate(80,108)">
    <rect x="0" y="0" width="210" height="160" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
    <text x="105" y="52" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#1565c0">mẫu mục tiêu</text>
    <text x="105" y="94" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">sinh bộ lọc</text>
    <text x="105" y="124" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">phụ thuộc mục tiêu</text>
  </g>
  <path d="M310 188 L395 188" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-rpn-branch)"/>
  <g transform="translate(420,108)">
    <rect x="0" y="0" width="210" height="160" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
    <text x="105" y="52" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">vùng tìm kiếm</text>
    <text x="105" y="94" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">được quét bởi</text>
    <text x="105" y="124" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">bộ lọc mẫu</text>
  </g>
  <path d="M650 188 C720 172 745 125 790 110" stroke="#455a64" stroke-width="4" fill="none" marker-end="url(#arrow-rpn-branch)"/>
  <path d="M650 188 C720 204 745 252 790 270" stroke="#455a64" stroke-width="4" fill="none" marker-end="url(#arrow-rpn-branch)"/>

  <g transform="translate(815,68)">
    <rect x="0" y="0" width="230" height="130" rx="10" fill="#fff3e0" stroke="#ffb74d" stroke-width="3"/>
    <text x="115" y="42" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#ef6c00">phân loại</text>
    <text x="115" y="82" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">hộp neo này là mục tiêu</text>
    <text x="115" y="108" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">hay nền?</text>
  </g>

  <g transform="translate(815,232)">
    <rect x="0" y="0" width="230" height="130" rx="10" fill="#f3e5f5" stroke="#ce93d8" stroke-width="3"/>
    <text x="115" y="42" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#7b1fa2">hồi quy hộp</text>
    <text x="115" y="82" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">hộp neo cần dịch, co giãn</text>
    <text x="115" y="108" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">bao nhiêu?</text>
  </g>
</svg>
