<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420">
  <rect width="1120" height="420" fill="#ffffff"/>
  <text x="560" y="38" text-anchor="middle" font-size="27" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Điểm yếu của SORT: khi che khuất, hình học có thể không đủ giữ ID</text>
  <g transform="translate(70,85)" font-family="Arial, sans-serif">
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="250" height="230" rx="8" fill="#fafafa" stroke="#cfd8dc" stroke-width="2"/>
      <text x="125" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">trước khi gặp nhau</text>
      <rect x="58" y="80" width="44" height="96" fill="none" stroke="#2e7d32" stroke-width="5"/>
      <rect x="146" y="82" width="44" height="96" fill="none" stroke="#ef6c00" stroke-width="5"/>
      <text x="80" y="205" text-anchor="middle" font-size="18" fill="#2e7d32">ID 1</text>
      <text x="168" y="205" text-anchor="middle" font-size="18" fill="#ef6c00">ID 2</text>
    </g>
    <g transform="translate(330,0)">
      <rect x="0" y="0" width="250" height="230" rx="8" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
      <text x="125" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">che khuất</text>
      <rect x="93" y="80" width="56" height="104" fill="none" stroke="#546e7a" stroke-width="5"/>
      <rect x="109" y="74" width="56" height="104" fill="none" stroke="#546e7a" stroke-width="5" opacity="0.55"/>
      <text x="125" y="210" text-anchor="middle" font-size="18" fill="#455a64">chỉ còn hình học mơ hồ</text>
    </g>
    <g transform="translate(660,0)">
      <rect x="0" y="0" width="250" height="230" rx="8" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
      <text x="125" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">sau khi tách ra</text>
      <rect x="58" y="82" width="44" height="96" fill="none" stroke="#ef6c00" stroke-width="5"/>
      <rect x="146" y="80" width="44" height="96" fill="none" stroke="#2e7d32" stroke-width="5"/>
      <text x="80" y="205" text-anchor="middle" font-size="18" fill="#ef6c00">ID 2?</text>
      <text x="168" y="205" text-anchor="middle" font-size="18" fill="#2e7d32">ID 1?</text>
    </g>
  </g>
  <text x="560" y="374" text-anchor="middle" font-size="21" font-family="Arial, sans-serif" fill="#455a64">Nếu hai hộp có chuyển động và kích thước gần giống nhau, IoU không biết ai là ai sau khi xuất hiện lại.</text>
</svg>
