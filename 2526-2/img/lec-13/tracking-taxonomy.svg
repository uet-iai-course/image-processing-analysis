<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Hai bài toán bám bắt: SOT và MOT">
  <rect width="1200" height="500" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Hai cách đặt bài toán bám bắt đối tượng</text>

  <g transform="translate(110,90)">
    <rect width="430" height="330" rx="12" fill="#e3f2fd" stroke="#64b5f6" stroke-width="2"/>
    <text x="215" y="42" text-anchor="middle" font-size="28" font-weight="700" font-family="Arial, sans-serif" fill="#1565c0">SOT</text>
    <text x="215" y="72" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#0d47a1">bám bắt một đối tượng đã chọn</text>
    <rect x="82" y="105" width="266" height="130" rx="8" fill="#ffffff" stroke="#90a4ae"/>
    <rect x="128" y="138" width="78" height="58" fill="none" stroke="#1565c0" stroke-width="6"/>
    <path d="M168 274 C218 246 258 244 308 218" fill="none" stroke="#1565c0" stroke-width="5"/>
    <circle cx="168" cy="274" r="7" fill="#1565c0"/>
    <circle cx="308" cy="218" r="7" fill="#1565c0"/>
    <text x="215" y="305" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">đầu vào: hộp khởi tạo</text>
  </g>

  <g transform="translate(660,90)">
    <rect width="430" height="330" rx="12" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
    <text x="215" y="42" text-anchor="middle" font-size="28" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">MOT</text>
    <text x="215" y="72" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#1b5e20">bám bắt nhiều đối tượng cùng lúc</text>
    <rect x="76" y="105" width="278" height="130" rx="8" fill="#ffffff" stroke="#90a4ae"/>
    <rect x="98" y="135" width="62" height="56" fill="none" stroke="#ef6c00" stroke-width="5"/>
    <rect x="220" y="126" width="70" height="70" fill="none" stroke="#7b1fa2" stroke-width="5"/>
    <path d="M130 274 C164 246 184 241 226 222" fill="none" stroke="#ef6c00" stroke-width="5"/>
    <path d="M254 274 C238 244 244 224 268 205" fill="none" stroke="#7b1fa2" stroke-width="5"/>
    <text x="130" y="305" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#e65100">ID 3</text>
    <text x="254" y="305" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#4a148c">ID 8</text>
  </g>

  <text x="600" y="462" text-anchor="middle" font-size="22" font-family="Arial, sans-serif" fill="#455a64">SOT bắt đầu từ một mục tiêu; MOT phải vừa phát hiện, vừa gán đúng danh tính cho nhiều mục tiêu.</text>
</svg>
