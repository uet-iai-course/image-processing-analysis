<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-label="Từ học trực tuyến sang học so khớp ngoại tuyến trong SOT">
  <defs>
    <marker id="arrow-siam-online" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#455a64"/>
    </marker>
  </defs>
  <rect width="1100" height="430" fill="#ffffff"/>
  <text x="550" y="38" text-anchor="middle" font-size="27" font-weight="700" font-family="Arial, sans-serif" fill="#263238">SOT cần bám vật chưa biết trước, nhưng vẫn phải chạy nhanh</text>

  <g transform="translate(70,80)">
    <rect width="430" height="270" rx="12" fill="#fff3e0" stroke="#ffb74d" stroke-width="2"/>
    <text x="215" y="42" text-anchor="middle" font-size="24" font-weight="700" font-family="Arial, sans-serif" fill="#ef6c00">Cách cũ: học trực tuyến</text>
    <g transform="translate(42,82)">
      <rect x="0" y="0" width="96" height="74" rx="8" fill="#ffffff" stroke="#90a4ae"/>
      <rect x="24" y="22" width="46" height="34" fill="none" stroke="#ef6c00" stroke-width="4"/>
      <text x="48" y="104" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">khung đầu</text>
    </g>
    <path d="M158 120 L232 120" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-siam-online)"/>
    <g transform="translate(250,82)">
      <rect x="0" y="0" width="128" height="74" rx="8" fill="#ffffff" stroke="#ef6c00"/>
      <text x="64" y="31" text-anchor="middle" font-size="18" font-weight="700" font-family="Arial, sans-serif" fill="#ef6c00">tối ưu</text>
      <text x="64" y="56" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">tham số riêng</text>
    </g>
    <text x="215" y="215" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">mạnh khi có thời gian cập nhật</text>
    <text x="215" y="246" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#c62828">chậm nếu phải cập nhật trọng số trong lúc chạy video</text>
  </g>

  <g transform="translate(600,80)">
    <rect width="430" height="270" rx="12" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
    <text x="215" y="42" text-anchor="middle" font-size="24" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">SiamFC: học ngoại tuyến</text>
    <g transform="translate(38,78)">
      <rect x="0" y="0" width="100" height="82" rx="8" fill="#ffffff" stroke="#1565c0"/>
      <text x="50" y="34" text-anchor="middle" font-size="18" font-weight="700" font-family="Arial, sans-serif" fill="#1565c0">mẫu</text>
      <text x="50" y="60" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">khung đầu</text>
    </g>
    <g transform="translate(162,78)">
      <rect x="0" y="0" width="100" height="82" rx="8" fill="#ffffff" stroke="#2e7d32"/>
      <text x="50" y="34" text-anchor="middle" font-size="18" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">vùng tìm</text>
      <text x="50" y="60" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">khung mới</text>
    </g>
    <path d="M276 119 L334 119" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-siam-online)"/>
    <g transform="translate(342,78)">
      <rect x="0" y="0" width="58" height="82" rx="8" fill="#ffffff" stroke="#7b1fa2"/>
      <text x="29" y="36" text-anchor="middle" font-size="18" font-weight="700" font-family="Arial, sans-serif" fill="#7b1fa2">đỉnh</text>
      <text x="29" y="61" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">đáp ứng</text>
    </g>
    <text x="215" y="215" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">học trước trên nhiều video</text>
    <text x="215" y="246" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#2e7d32">khi suy luận chỉ so khớp, không cần cập nhật trọng số</text>
  </g>
  <text x="550" y="398" text-anchor="middle" font-size="21" font-family="Arial, sans-serif" fill="#455a64">Bước chuyển tư duy: học một hàm so khớp chung, không học riêng một mô hình cho từng video.</text>
</svg>
