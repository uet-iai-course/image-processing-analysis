<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-label="Nhãn và mất mát logistic của SiamFC">
  <rect width="1100" height="430" fill="#ffffff"/>
  <text x="550" y="38" text-anchor="middle" font-size="27" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Huấn luyện SiamFC: chỉ vài vị trí quanh tâm là dương</text>

  <g transform="translate(105,80)">
    <rect x="0" y="0" width="255" height="255" rx="10" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="3"/>
    <text x="128" y="-14" text-anchor="middle" font-size="20" font-weight="700" font-family="Arial, sans-serif" fill="#7b1fa2">nhãn trên bản đồ đáp ứng</text>
    <g stroke="#ce93d8" stroke-width="1.6">
      <path d="M30 0 V255"/><path d="M60 0 V255"/><path d="M90 0 V255"/><path d="M120 0 V255"/><path d="M150 0 V255"/><path d="M180 0 V255"/><path d="M210 0 V255"/><path d="M240 0 V255"/>
      <path d="M0 30 H255"/><path d="M0 60 H255"/><path d="M0 90 H255"/><path d="M0 120 H255"/><path d="M0 150 H255"/><path d="M0 180 H255"/><path d="M0 210 H255"/><path d="M0 240 H255"/>
    </g>
    <circle cx="128" cy="128" r="44" fill="#2e7d32" opacity="0.25" stroke="#2e7d32" stroke-width="4"/>
    <circle cx="128" cy="128" r="8" fill="#2e7d32"/>
    <text x="128" y="294" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">gần tâm: \(y=+1\), xa tâm: \(y=-1\)</text>
  </g>

  <g transform="translate(445,90)">
    <rect x="0" y="0" width="260" height="230" rx="10" fill="#e8f5e9" stroke="#66bb6a"/>
    <text x="130" y="42" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">Mục tiêu học</text>
    <text x="130" y="86" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">điểm gần tâm</text>
    <text x="130" y="116" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">có điểm đáp ứng cao</text>
    <text x="130" y="160" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">điểm xa tâm</text>
    <text x="130" y="190" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">có điểm đáp ứng thấp</text>
  </g>

  <g transform="translate(780,90)">
    <rect x="0" y="0" width="240" height="230" rx="10" fill="#fff3e0" stroke="#ffcc80"/>
    <text x="120" y="42" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#ef6c00">Không cần lớp</text>
    <text x="120" y="86" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">mỗi vị trí chỉ hỏi:</text>
    <text x="120" y="124" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">“có phải tâm mục tiêu</text>
    <text x="120" y="154" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#263238">nằm quanh đây không?”</text>
    <text x="120" y="198" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455a64">đây là phân loại nhị phân theo vị trí</text>
  </g>
</svg>
