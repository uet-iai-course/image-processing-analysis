<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="Từ phát hiện từng ảnh sang bám bắt theo thời gian">
  <defs>
    <marker id="dtt-arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#455a64"/>
    </marker>
  </defs>
  <rect width="1200" height="500" fill="#fff"/>
  <text x="600" y="42" text-anchor="middle" font-size="28" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Phát hiện trả lời “ở đâu”, bám bắt thêm “có còn là nó không?”</text>

  <g transform="translate(60,82)">
    <rect width="500" height="330" rx="12" fill="#fff8e1" stroke="#ffb300" stroke-width="2"/>
    <text x="250" y="38" text-anchor="middle" font-size="24" font-weight="700" font-family="Arial, sans-serif" fill="#ef6c00">Phát hiện đối tượng</text>

    <g transform="translate(50,78)">
      <rect width="110" height="96" rx="8" fill="#e3f2fd" stroke="#90a4ae" stroke-width="2"/>
      <rect x="25" y="30" width="58" height="46" fill="none" stroke="#ef6c00" stroke-width="5"/>
      <text x="55" y="124" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">khung t</text>
    </g>
    <g transform="translate(195,78)">
      <rect width="110" height="96" rx="8" fill="#e3f2fd" stroke="#90a4ae" stroke-width="2"/>
      <rect x="39" y="30" width="58" height="46" fill="none" stroke="#ef6c00" stroke-width="5"/>
      <text x="55" y="124" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">khung t+1</text>
    </g>
    <g transform="translate(340,78)">
      <rect width="110" height="96" rx="8" fill="#e3f2fd" stroke="#90a4ae" stroke-width="2"/>
      <rect x="49" y="30" width="58" height="46" fill="none" stroke="#ef6c00" stroke-width="5"/>
      <text x="55" y="124" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">khung t+2</text>
    </g>

    <rect x="72" y="235" width="356" height="58" rx="8" fill="#ffecb3" stroke="#ffb300"/>
    <text x="250" y="258" text-anchor="middle" font-size="18" font-weight="700" font-family="Arial, sans-serif" fill="#e65100">Ba danh sách hộp độc lập</text>
    <text x="250" y="282" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#5d4037">chưa có danh tính, chưa có quỹ đạo</text>
  </g>

  <path d="M584 250 L656 250" stroke="#455a64" stroke-width="5" marker-end="url(#dtt-arrow)"/>

  <g transform="translate(680,82)">
    <rect width="460" height="330" rx="12" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
    <text x="230" y="38" text-anchor="middle" font-size="24" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">Bám bắt đối tượng</text>

    <g transform="translate(42,80)">
      <rect x="0" y="0" width="82" height="76" rx="8" fill="#ffffff" stroke="#90a4ae" stroke-width="2"/>
      <rect x="20" y="24" width="42" height="34" fill="none" stroke="#ef6c00" stroke-width="4"/>
      <text x="41" y="99" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#e65100">ID 7</text>
    </g>
    <path d="M126 118 C176 80 224 78 276 116 C314 143 350 141 404 105" fill="none" stroke="#7b1fa2" stroke-width="5" stroke-linecap="round"/>
    <g transform="translate(198,80)">
      <rect x="0" y="0" width="82" height="76" rx="8" fill="#ffffff" stroke="#90a4ae" stroke-width="2"/>
      <rect x="30" y="24" width="42" height="34" fill="none" stroke="#ef6c00" stroke-width="4"/>
      <text x="41" y="99" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#e65100">ID 7</text>
    </g>
    <g transform="translate(354,80)">
      <rect x="0" y="0" width="82" height="76" rx="8" fill="#ffffff" stroke="#90a4ae" stroke-width="2"/>
      <rect x="35" y="24" width="42" height="34" fill="none" stroke="#ef6c00" stroke-width="4"/>
      <text x="41" y="99" text-anchor="middle" font-size="15" font-family="Arial, sans-serif" fill="#e65100">ID 7</text>
    </g>

    <g transform="translate(46,225)">
      <rect x="0" y="0" width="108" height="66" rx="8" fill="#ffffff" stroke="#2e7d32"/>
      <text x="54" y="28" text-anchor="middle" font-size="16" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">Dự báo</text>
      <text x="54" y="50" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#455a64">vị trí tiếp</text>
    </g>
    <g transform="translate(176,225)">
      <rect x="0" y="0" width="108" height="66" rx="8" fill="#ffffff" stroke="#2e7d32"/>
      <text x="54" y="28" text-anchor="middle" font-size="16" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">Ghép cặp</text>
      <text x="54" y="50" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#455a64">hộp - track</text>
    </g>
    <g transform="translate(306,225)">
      <rect x="0" y="0" width="108" height="66" rx="8" fill="#ffffff" stroke="#2e7d32"/>
      <text x="54" y="28" text-anchor="middle" font-size="16" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">Cập nhật</text>
      <text x="54" y="50" text-anchor="middle" font-size="14" font-family="Arial, sans-serif" fill="#455a64">quỹ đạo</text>
    </g>
