  <text x="560" y="378" text-anchor="middle" font-size="21" font-family="Arial, sans-serif" fill="#455a64">DeepSORT dùng đặc trưng đã học ngoại tuyến; trong lúc chạy, mô hình chỉ trích đặc trưng và so khớp.</text>
