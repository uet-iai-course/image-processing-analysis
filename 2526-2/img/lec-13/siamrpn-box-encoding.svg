<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-label="Mã hóa hồi quy hộp trong SiamRPN">
  <defs>
    <marker id="arrow-box-enc" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#455a64"/>
    </marker>
  </defs>
  <rect width="1120" height="430" fill="#ffffff"/>
  <text x="560" y="38" text-anchor="middle" font-size="27" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Hồi quy hộp không dự đoán tọa độ tuyệt đối, mà dự đoán độ lệch từ hộp neo</text>

  <g transform="translate(95,84)">
    <rect x="0" y="0" width="330" height="235" rx="10" fill="#eef7ff" stroke="#90a4ae"/>
    <rect x="96" y="88" width="110" height="78" fill="none" stroke="#ef6c00" stroke-width="5"/>
    <rect x="145" y="65" width="130" height="102" fill="none" stroke="#2e7d32" stroke-width="5"/>
    <circle cx="151" cy="127" r="7" fill="#ef6c00"/>
    <circle cx="210" cy="116" r="7" fill="#2e7d32"/>
    <path d="M151 127 L210 116" stroke="#c62828" stroke-width="4" marker-end="url(#arrow-box-enc)"/>
    <text x="151" y="196" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#ef6c00">hộp neo</text>
    <text x="218" y="48" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2e7d32">hộp thật</text>
  </g>

  <g transform="translate(500,84)">
    <rect x="0" y="0" width="250" height="235" rx="10" fill="#fff3e0" stroke="#ffcc80"/>
    <text x="125" y="42" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#ef6c00">4 độ lệch</text>
    <text x="125" y="88" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#263238">dịch tâm: \(t_x,t_y\)</text>
    <text x="125" y="128" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#263238">đổi kích thước: \(t_w,t_h\)</text>
    <text x="125" y="178" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455a64">mạng học chỉnh hộp neo</text>
  </g>

  <g transform="translate(820,84)">
    <rect x="0" y="0" width="230" height="235" rx="10" fill="#e8f5e9" stroke="#66bb6a"/>
    <text x="115" y="42" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">kết quả</text>
    <text x="115" y="88" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#263238">hộp neo + độ lệch</text>
    <text x="115" y="128" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#263238">→ hộp dự đoán</text>
    <rect x="68" y="162" width="98" height="50" fill="none" stroke="#2e7d32" stroke-width="5"/>
  </g>
</svg>
