<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430" role="img" aria-label="Bản đồ đáp ứng của SiamFC và cập nhật vị trí">
  <defs>
    <marker id="arrow-response" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#455a64"/>
    </marker>
  </defs>
  <rect width="1100" height="430" fill="#ffffff"/>
  <text x="550" y="38" text-anchor="middle" font-size="27" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Bản đồ đáp ứng biến điểm giống nhất thành vị trí mới</text>

  <g transform="translate(85,88)">
    <rect x="0" y="0" width="300" height="230" rx="10" fill="#eef7ff" stroke="#90a4ae"/>
    <text x="150" y="30" text-anchor="middle" font-size="21" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">vùng tìm kiếm</text>
    <rect x="0" y="165" width="300" height="65" fill="#c8e6c9"/>
    <rect x="110" y="75" width="120" height="100" fill="none" stroke="#2e7d32" stroke-width="5" stroke-dasharray="8 6"/>
    <circle cx="190" cy="120" r="22" fill="#ffcc80" stroke="#ef6c00" stroke-width="3"/>
    <rect x="160" y="95" width="60" height="54" fill="none" stroke="#ef6c00" stroke-width="5"/>
    <line x1="170" y1="125" x2="190" y2="120" stroke="#c62828" stroke-width="4"/>
    <text x="166" y="202" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#455a64">tâm cũ</text>
    <text x="226" y="202" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#ef6c00">đỉnh mới</text>
  </g>

  <path d="M420 204 L500 204" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-response)"/>

  <g transform="translate(525,82)">
    <rect x="0" y="0" width="250" height="250" rx="10" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="3"/>
    <text x="125" y="-14" text-anchor="middle" font-size="21" font-weight="700" font-family="Arial, sans-serif" fill="#7b1fa2">17 x 17</text>
    <g stroke="#ce93d8" stroke-width="1.6">
      <path d="M29 0 V250"/><path d="M58 0 V250"/><path d="M87 0 V250"/><path d="M116 0 V250"/><path d="M145 0 V250"/><path d="M174 0 V250"/><path d="M203 0 V250"/><path d="M232 0 V250"/>
      <path d="M0 29 H250"/><path d="M0 58 H250"/><path d="M0 87 H250"/><path d="M0 116 H250"/><path d="M0 145 H250"/><path d="M0 174 H250"/><path d="M0 203 H250"/><path d="M0 232 H250"/>
    </g>
    <circle cx="166" cy="121" r="28" fill="#ef6c00" opacity="0.85"/>
    <circle cx="125" cy="125" r="7" fill="#455a64"/>
    <path d="M125 125 L166 121" stroke="#c62828" stroke-width="4" marker-end="url(#arrow-response)"/>
    <text x="125" y="285" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455a64">dịch chuyển trên lưới đáp ứng</text>
  </g>

  <path d="M808 204 L888 204" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-response)"/>

  <g transform="translate(910,105)">
    <rect x="0" y="0" width="140" height="190" rx="10" fill="#e8f5e9" stroke="#2e7d32"/>
    <text x="70" y="46" text-anchor="middle" font-size="20" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">cập nhật</text>
    <text x="70" y="82" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">tâm hộp</text>
    <text x="70" y="118" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">sang vị trí</text>
    <text x="70" y="154" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#263238">đỉnh đáp ứng</text>
  </g>
  <text x="550" y="390" text-anchor="middle" font-size="21" font-family="Arial, sans-serif" fill="#455a64">Nếu đỉnh nằm lệch phải so với tâm vùng tìm kiếm, hộp mục tiêu được dịch sang phải.</text>
</svg>
