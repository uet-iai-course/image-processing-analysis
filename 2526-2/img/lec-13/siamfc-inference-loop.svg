<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="430" viewBox="0 0 1150 430" role="img" aria-label="Vòng suy luận của SiamFC">
  <defs>
    <marker id="arrow-loop" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#455a64"/>
    </marker>
  </defs>
  <rect width="1150" height="430" fill="#ffffff"/>
  <text x="575" y="38" text-anchor="middle" font-size="27" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Suy luận SiamFC là một vòng lặp cắt vùng - so khớp - cập nhật</text>

  <g transform="translate(75,90)">
    <rect x="0" y="0" width="145" height="100" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
    <text x="72" y="38" text-anchor="middle" font-size="19" font-weight="700" font-family="Arial, sans-serif" fill="#1565c0">khởi tạo</text>
    <text x="72" y="68" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">mẫu từ khung 1</text>
  </g>
  <path d="M238 140 L315 140" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-loop)"/>
  <g transform="translate(335,90)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
    <text x="80" y="34" text-anchor="middle" font-size="19" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">cắt vùng tìm</text>
    <text x="80" y="64" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">quanh vị trí cũ</text>
  </g>
  <path d="M512 140 L590 140" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-loop)"/>
  <g transform="translate(610,90)">
    <rect x="0" y="0" width="160" height="100" rx="8" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
    <text x="80" y="34" text-anchor="middle" font-size="19" font-weight="700" font-family="Arial, sans-serif" fill="#ef6c00">SiamFC</text>
    <text x="80" y="64" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">bản đồ đáp ứng</text>
  </g>
  <path d="M787 140 L865 140" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-loop)"/>
  <g transform="translate(885,90)">
    <rect x="0" y="0" width="170" height="100" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="3"/>
    <text x="85" y="34" text-anchor="middle" font-size="19" font-weight="700" font-family="Arial, sans-serif" fill="#7b1fa2">lấy đỉnh</text>
    <text x="85" y="64" text-anchor="middle" font-size="16" font-family="Arial, sans-serif" fill="#455a64">cập nhật tâm hộp</text>
  </g>

  <path d="M970 205 C910 286 455 292 420 205" fill="none" stroke="#455a64" stroke-width="4" stroke-dasharray="8 7" marker-end="url(#arrow-loop)"/>
  <text x="682" y="302" text-anchor="middle" font-size="19" font-family="Arial, sans-serif" fill="#455a64">lặp ở khung kế tiếp</text>

  <g transform="translate(205,335)">
    <rect x="0" y="-28" width="740" height="54" rx="8" fill="#e3f2fd" stroke="#90caf9"/>
    <text x="370" y="5" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#0d47a1">thực tế thường chạy vài tỉ lệ quanh kích thước cũ, rồi chọn đáp ứng mạnh nhất</text>
  </g>
</svg>
