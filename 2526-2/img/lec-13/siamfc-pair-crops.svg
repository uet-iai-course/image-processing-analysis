    <circle cx="132" cy="112" r="22" fill="#ffcc80" stroke="#ef6c00" stroke-width="3"/>
  </g>
  <path d="M337 175 L407 175" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-pair-crop)"/>
  <g transform="translate(420,98)">
