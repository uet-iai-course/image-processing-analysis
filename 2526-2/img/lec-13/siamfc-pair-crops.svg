    <text x="135" y="31" text-anchor="middle" font-size="21" font-weight="700" font-family="Arial, sans-serif" fill="#1565c0">Khung A</text>
    <rect x="0" y="150" width="270" height="60" fill="#c8e6c9"/>
    <path d="M0 145 C70 110 120 128 174 100 C220 76 248 82 270 94 L270 154 L0 154 Z" fill="#bbdefb"/>
