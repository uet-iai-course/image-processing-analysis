    <text x="80" y="190" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#1565c0">mẫu mục tiêu \(z\)</text>
  </g>

  <g transform="translate(625,78)">
    <rect x="0" y="0" width="270" height="210" rx="10" fill="#eef7ff" stroke="#90a4ae"/>
    <text x="135" y="31" text-anchor="middle" font-size="21" font-weight="700" font-family="Arial, sans-serif" fill="#2e7d32">Khung B</text>
    <rect x="0" y="150" width="270" height="60" fill="#c8e6c9"/>
    <path d="M0 145 C70 110 120 128 174 100 C220 76 248 82 270 94 L270 154 L0 154 Z" fill="#bbdefb"/>
    <rect x="130" y="86" width="74" height="58" fill="none" stroke="#ef6c00" stroke-width="5"/>
    <rect x="90" y="58" width="154" height="126" fill="none" stroke="#2e7d32" stroke-width="5" stroke-dasharray="8 6"/>
