  </defs>
  <rect width="1100" height="430" fill="#ffffff"/>
  <text x="550" y="38" text-anchor="middle" font-size="27" font-weight="700" font-family="Arial, sans-serif" fill="#263238">Huấn luyện SiamFC bằng cặp khung hình cùng một vật</text>

  <g transform="translate(55,78)">
