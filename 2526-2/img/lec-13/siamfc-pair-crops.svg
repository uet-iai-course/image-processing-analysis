  </g>
  <path d="M907 175 L970 175" stroke="#455a64" stroke-width="4" marker-end="url(#arrow-pair-crop)"/>
  <g transform="translate(980,98)">
    <rect x="0" y="0" width="100" height="160" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="3"/>
