    <text x="50" y="190" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#2e7d32">vùng tìm \(x\)</text>
  </g>

  <g transform="translate(185,335)">
    <rect x="0" y="-28" width="730" height="50" rx="8" fill="#e8f5e9" stroke="#66bb6a"/>
