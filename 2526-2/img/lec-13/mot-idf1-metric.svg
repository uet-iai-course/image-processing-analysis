<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-label="IDF1 đo độ đúng danh tính trên quỹ đạo">
  <rect width="1000" height="360" fill="#ffffff"/>
  <text x="500" y="36" text-anchor="middle" font-size="26" font-weight="700" font-family="Arial, sans-serif" fill="#263238">IDF1 ưu tiên giữ đúng danh tính qua toàn bộ quỹ đạo</text>
  <g transform="translate(90,78)">
    <rect x="0" y="0" width="820" height="190" rx="10" fill="#f7f7f7" stroke="#cfd8dc"/>
    <line x1="70" y1="70" x2="750" y2="70" stroke="#90a4ae" stroke-width="2"/>
    <text x="30" y="76" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455a64">GT</text>
    <path d="M90 70 L730 70" stroke="#2e7d32" stroke-width="8" stroke-linecap="round"/>
    <text x="760" y="76" font-size="18" font-family="Arial, sans-serif" fill="#2e7d32">ID thật A</text>
    <line x1="70" y1="135" x2="750" y2="135" stroke="#90a4ae" stroke-width="2"/>
    <text x="30" y="141" text-anchor="middle" font-size="18" font-family="Arial, sans-serif" fill="#455a64">Dự đoán</text>
    <path d="M90 135 L395 135" stroke="#1565c0" stroke-width="8" stroke-linecap="round"/>
    <path d="M410 135 L730 135" stroke="#ef6c00" stroke-width="8" stroke-linecap="round"/>
    <text x="238" y="165" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#1565c0">ID A</text>
    <text x="570" y="165" text-anchor="middle" font-size="17" font-family="Arial, sans-serif" fill="#ef6c00">ID B</text>
    <text x="402" y="120" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, sans-serif" fill="#c62828">đổi ID</text>
  </g>
  <text x="500" y="320" text-anchor="middle" font-size="20" font-family="Arial, sans-serif" fill="#455a64">Một hộp có thể đúng vị trí nhưng vẫn làm IDF1 giảm nếu thuộc sai danh tính.</text>
</svg>
