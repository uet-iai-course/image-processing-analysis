  <rect x="24" y="32" width="1152" height="540" rx="18" fill="#fafafa" stroke="#d0d7de" stroke-width="2"/>

  <text x="170" y="90" text-anchor="middle" font-size="30" font-weight="700" fill="#263238" font-family="Arial">Dữ liệu huấn luyện</text>
  <g transform="translate(60,125)">
    <rect x="0" y="0" width="110" height="110" rx="12" fill="url(#imgA)" stroke="#1565c0" stroke-width="3"/>
    <circle cx="54" cy="52" r="26" fill="#64b5f6"/>
    <rect x="34" y="72" width="42" height="20" rx="6" fill="#1976d2"/>
    <rect x="130" y="0" width="110" height="110" rx="12" fill="url(#imgB)" stroke="#ef6c00" stroke-width="3"/>
    <polygon points="185,24 220,86 150,86" fill="#ffb74d"/>
    <rect x="260" y="0" width="110" height="110" rx="12" fill="url(#imgC)" stroke="#2e7d32" stroke-width="3"/>
    <rect x="292" y="30" width="48" height="60" rx="9" fill="#66bb6a"/>

    <rect x="0" y="135" width="110" height="110" rx="12" fill="url(#imgC)" stroke="#2e7d32" stroke-width="3"/>
    <circle cx="36" cy="45" r="18" fill="#81c784"/>
    <circle cx="76" cy="73" r="24" fill="#43a047"/>
    <rect x="130" y="135" width="110" height="110" rx="12" fill="url(#imgA)" stroke="#1565c0" stroke-width="3"/>
    <rect x="156" y="28" width="60" height="56" rx="8" fill="#42a5f5"/>
