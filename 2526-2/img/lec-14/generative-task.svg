  <path d="M455 300 L585 300" stroke="#555" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(610,145)">
    <rect x="0" y="0" width="250" height="285" rx="16" fill="#f7efe6" stroke="#b15a2b" stroke-width="4"/>
    <text x="125" y="46" text-anchor="middle" font-size="28" font-weight="700" fill="#8a3f1a" font-family="Arial">Mô hình sinh</text>
    <text x="125" y="88" text-anchor="middle" font-size="22" fill="#263238" font-family="Arial">học cấu trúc của</text>
    <text x="125" y="116" text-anchor="middle" font-size="24" font-weight="700" fill="#263238" font-family="Arial">p_data(x)</text>
    <path d="M50 168 C95 110 155 225 205 158" fill="none" stroke="#b15a2b" stroke-width="5"/>
    <circle cx="66" cy="160" r="7" fill="#1565c0"/>
    <circle cx="116" cy="138" r="7" fill="#ef6c00"/>
    <circle cx="164" cy="197" r="7" fill="#2e7d32"/>
    <circle cx="204" cy="158" r="7" fill="#7b1fa2"/>
    <text x="125" y="250" text-anchor="middle" font-size="20" fill="#455a64" font-family="Arial">mật độ, mẫu, điều kiện</text>
  </g>

  <path d="M880 300 L1010 300" stroke="#555" stroke-width="5" fill="none" marker-end="url(#arrow)"/>

  <text x="1080" y="90" text-anchor="middle" font-size="30" font-weight="700" fill="#263238" font-family="Arial">Ảnh mới</text>
  <g transform="translate(1000,150)">
    <rect x="0" y="0" width="165" height="165" rx="16" fill="#fff" stroke="#cfd8dc" stroke-width="3"/>
    <rect x="18" y="20" width="130" height="110" rx="12" fill="#e1f5fe" stroke="#1565c0" stroke-width="3"/>
    <circle cx="62" cy="65" r="22" fill="#29b6f6"/>
    <path d="M28 126 C56 82 78 105 94 82 C110 60 126 86 142 124 Z" fill="#4caf50"/>
    <text x="82" y="205" text-anchor="middle" font-size="22" fill="#455a64" font-family="Arial">không sao chép</text>
    <text x="82" y="235" text-anchor="middle" font-size="22" fill="#455a64" font-family="Arial">ảnh cụ thể</text>
  </g>

  <rect x="330" y="498" width="540" height="62" rx="10" fill="#fff3e0" stroke="#ef6c00" stroke-width="2"/>
  <text x="600" y="524" text-anchor="middle" font-size="21" font-weight="700" fill="#263238" font-family="Arial">Mục tiêu: sinh mẫu mới</text>
  <text x="600" y="548" text-anchor="middle" font-size="21" fill="#263238" font-family="Arial">có cùng phân phối với dữ liệu thật</text>
