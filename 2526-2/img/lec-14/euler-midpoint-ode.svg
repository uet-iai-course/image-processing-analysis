<svg xmlns="http://www.w3.org/2000/svg" width="560" height="420" viewBox="0 0 560 420" role="img" aria-label="Minh họa Euler và Midpoint">
  <defs>
    <marker id="arrBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565c0"/>
    </marker>
    <marker id="arrOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ef6c00"/>
    </marker>
    <style>
      .label{font:700 22px Arial,sans-serif;fill:#263238;text-anchor:middle}
      .small{font:16px Arial,sans-serif;fill:#455a64;text-anchor:middle}
      .math{font:700 18px Arial,sans-serif;fill:#263238;text-anchor:middle}
    </style>
  </defs>
  <rect width="560" height="420" rx="16" fill="#fafafa" stroke="#cfd8dc" stroke-width="2"/>
  <text class="label" x="280" y="38">Euler và Midpoint</text>

  <path d="M70 335 C135 250 190 205 250 185 C320 160 390 118 485 70" stroke="#b0bec5" stroke-width="5" fill="none"/>
  <text class="small" x="430" y="95">đường dòng thật</text>

  <circle cx="120" cy="285" r="8" fill="#263238"/>
  <text class="math" x="115" y="315">x<tspan baseline-shift="sub" font-size="12">t</tspan></text>

  <path d="M120 285 L285 215" stroke="#1565c0" stroke-width="5" fill="none" marker-end="url(#arrBlue)"/>
  <circle cx="285" cy="215" r="7" fill="#1565c0"/>
  <text class="small" x="238" y="245">Euler</text>
  <text class="math" x="315" y="218">x<tspan baseline-shift="sub" font-size="12">t+Δt</tspan></text>

  <path d="M120 285 L203 250" stroke="#ef6c00" stroke-width="4" fill="none" stroke-dasharray="8 7"/>
  <circle cx="203" cy="250" r="7" fill="#ef6c00"/>
  <text class="math" x="205" y="278">x<tspan baseline-shift="sub" font-size="12">mid</tspan></text>
  <path d="M120 285 C180 245 250 205 338 168" stroke="#ef6c00" stroke-width="5" fill="none" marker-end="url(#arrOrange)"/>
  <circle cx="338" cy="168" r="7" fill="#ef6c00"/>
  <text class="small" x="305" y="145">Midpoint</text>

  <rect x="65" y="352" width="430" height="40" rx="10" fill="#f7f7f7" stroke="#cfd8dc" stroke-width="2"/>
  <text class="small" x="280" y="378">Midpoint dùng hướng tại giữa bước nên bám đường dòng hơn.</text>
</svg>
