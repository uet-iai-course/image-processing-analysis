<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-label="Huấn luyện khuếch tán ẩn có điều kiện văn bản">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#607d8b"/>
    </marker>
    <style>
      .title{font:700 32px Arial,sans-serif;fill:#263238;text-anchor:middle}
      .label{font:700 21px Arial,sans-serif;fill:#263238;text-anchor:middle}
      .small{font:17px Arial,sans-serif;fill:#455a64;text-anchor:middle}
      .tiny{font:15px Arial,sans-serif;fill:#607d8b;text-anchor:middle}
      .math{font:700 20px Arial,sans-serif;fill:#263238;text-anchor:middle}
    </style>
  </defs>
  <rect width="1200" height="650" fill="#fafafa"/>
  <text class="title" x="600" y="54">Huấn luyện khuếch tán ẩn có điều kiện văn bản</text>

  <g transform="translate(60,135)">
    <rect x="0" y="0" width="155" height="92" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="3"/>
    <text class="label" x="77" y="35">Ảnh x</text>
    <text class="tiny" x="77" y="62">trong dữ liệu</text>
  </g>

  <g transform="translate(60,375)">
    <rect x="0" y="0" width="155" height="92" rx="12" fill="#fff3e0" stroke="#ef6c00" stroke-width="3"/>
    <text class="label" x="77" y="35">Mô tả y</text>
    <text class="tiny" x="77" y="62">đi cùng ảnh</text>
  </g>

  <g transform="translate(285,135)">
    <rect x="0" y="0" width="170" height="92" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
    <text class="label" x="85" y="33">Bộ mã hóa</text>
    <text class="math" x="85" y="65">z<tspan baseline-shift="sub" font-size="13">0</tspan>=E(x)</text>
  </g>

  <g transform="translate(520,135)">
    <rect x="0" y="0" width="190" height="92" rx="12" fill="#eceff1" stroke="#607d8b" stroke-width="3"/>
    <text class="label" x="95" y="33">Thêm nhiễu</text>
    <text class="math" x="95" y="65">z<tspan baseline-shift="sub" font-size="13">t</tspan></text>
  </g>

  <g transform="translate(295,375)">
    <rect x="0" y="0" width="170" height="92" rx="12" fill="#fff8e1" stroke="#ef6c00" stroke-width="3"/>
    <text class="label" x="85" y="33">Mã hóa chữ</text>
    <text class="math" x="85" y="65">c<tspan baseline-shift="sub" font-size="13">text</tspan></text>
  </g>

  <g transform="translate(545,375)">
    <rect x="0" y="0" width="165" height="92" rx="12" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="3"/>
    <text class="label" x="82" y="33">Mã hóa t</text>
    <text class="math" x="82" y="65">c<tspan baseline-shift="sub" font-size="13">t</tspan></text>
  </g>

  <g transform="translate(790,185)">
    <rect x="0" y="0" width="210" height="180" rx="16" fill="#ffebee" stroke="#c62828" stroke-width="4"/>
    <text class="label" x="105" y="42">U-Net</text>
    <text class="small" x="105" y="80">nhận z<tspan baseline-shift="sub" font-size="12">t</tspan>, c<tspan baseline-shift="sub" font-size="12">t</tspan>, c<tspan baseline-shift="sub" font-size="12">text</tspan></text>
    <text class="tiny" x="105" y="118">dự đoán nhiễu</text>
    <text class="math" x="105" y="152">ε̂<tspan baseline-shift="sub" font-size="13">θ</tspan></text>
  </g>

  <g transform="translate(1040,225)">
    <rect x="0" y="0" width="115" height="100" rx="12" fill="#f7f7f7" stroke="#90a4ae" stroke-width="3"/>
    <text class="label" x="57" y="35">Loss</text>
    <text class="math" x="57" y="68">ε̂ vs ε</text>
  </g>

  <path d="M220 181 L273 181" stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M462 181 L508 181" stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M720 181 L778 235" stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M220 421 L283 421" stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M475 421 L780 320" stroke="#ef6c00" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M720 421 L790 345" stroke="#7b1fa2" stroke-width="4" fill="none" marker-end="url(#arr)"/>
  <path d="M1007 275 L1028 275" stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arr)"/>

  <g transform="translate(405,260)">
    <rect x="0" y="0" width="250" height="54" rx="10" fill="#ffffff" stroke="#cfd8dc" stroke-width="2"/>
    <text class="small" x="125" y="34">chọn t và nhiễu ε</text>
  </g>
  <path d="M530 260 L580 232" stroke="#607d8b" stroke-width="3" fill="none" marker-end="url(#arr)"/>

  <rect x="240" y="540" width="720" height="58" rx="12" fill="#f7f7f7" stroke="#cfd8dc" stroke-width="2"/>
  <text class="small" x="600" y="563">Điểm khác DDPM thường: U-Net không chỉ biết mức nhiễu t,</text>
  <text class="small" x="600" y="587">mà còn biết mô tả văn bản cần bám theo.</text>
</svg>
