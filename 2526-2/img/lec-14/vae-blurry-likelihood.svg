<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-label="Vì sao VAE dễ sinh ảnh mờ">
  <defs>
    <style>
      .title{font:700 32px Arial,sans-serif;fill:#263238;text-anchor:middle}
      .label{font:700 22px Arial,sans-serif;fill:#263238;text-anchor:middle}
      .small{font:18px Arial,sans-serif;fill:#455a64;text-anchor:middle}
      .tiny{font:16px Arial,sans-serif;fill:#607d8b;text-anchor:middle}
      .warn{font:700 18px Arial,sans-serif;fill:#c62828;text-anchor:middle}
    </style>
  </defs>
  <rect width="1200" height="650" fill="#fafafa"/>
  <text class="title" x="600" y="46">Ảnh mờ xuất hiện khi hàm mất mát điểm ảnh</text>
  <text class="title" x="600" y="82">trung bình hóa nhiều khả năng đúng</text>

  <g transform="translate(95,132)">
    <rect x="0" y="0" width="290" height="330" rx="16" fill="#fff" stroke="#cfd8dc" stroke-width="2"/>
    <text class="label" x="145" y="42">Khả năng 1</text>
    <rect x="82" y="95" width="126" height="126" rx="10" fill="#eceff1" stroke="#90a4ae" stroke-width="2"/>
    <path d="M102 196 L190 110" stroke="#1565c0" stroke-width="18" stroke-linecap="round"/>
    <text class="tiny" x="145" y="275">cạnh nghiêng trái</text>
  </g>

  <g transform="translate(455,132)">
    <rect x="0" y="0" width="290" height="330" rx="16" fill="#fff" stroke="#cfd8dc" stroke-width="2"/>
    <text class="label" x="145" y="42">Khả năng 2</text>
    <rect x="82" y="95" width="126" height="126" rx="10" fill="#eceff1" stroke="#90a4ae" stroke-width="2"/>
    <path d="M102 110 L190 196" stroke="#1565c0" stroke-width="18" stroke-linecap="round"/>
    <text class="tiny" x="145" y="275">cạnh nghiêng phải</text>
  </g>

  <g transform="translate(815,132)">
    <rect x="0" y="0" width="290" height="330" rx="16" fill="#ffebee" stroke="#c62828" stroke-width="3"/>
    <text class="label" x="145" y="42">Trung bình</text>
    <rect x="82" y="95" width="126" height="126" rx="10" fill="#eceff1" stroke="#90a4ae" stroke-width="2"/>
    <path d="M102 196 L190 110" stroke="#1565c0" stroke-width="18" stroke-linecap="round" opacity="0.35"/>
    <path d="M102 110 L190 196" stroke="#1565c0" stroke-width="18" stroke-linecap="round" opacity="0.35"/>
    <text class="warn" x="145" y="275">chi tiết bị mờ</text>
  </g>

  <rect x="230" y="530" width="740" height="58" rx="14" fill="#f7f7f7" stroke="#cfd8dc" stroke-width="2"/>
  <text class="small" x="600" y="553">Xác suất điểm ảnh thưởng phương án giảm sai số trung bình,</text>
  <text class="small" x="600" y="577">không nhất thiết thưởng ảnh sắc.</text>
</svg>
