<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-label="Thủ thuật tái tham số hóa">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#607d8b"/>
    </marker>
    <style>
      .title{font:700 32px Arial,sans-serif;fill:#263238;text-anchor:middle}
      .label{font:700 22px Arial,sans-serif;fill:#263238;text-anchor:middle}
      .small{font:18px Arial,sans-serif;fill:#455a64;text-anchor:middle}
      .tiny{font:16px Arial,sans-serif;fill:#607d8b;text-anchor:middle}
      .bad{font:700 18px Arial,sans-serif;fill:#c62828;text-anchor:middle}
      .good{font:700 18px Arial,sans-serif;fill:#2e7d32;text-anchor:middle}
    </style>
  </defs>
  <rect width="1200" height="650" fill="#fafafa"/>
  <text class="title" x="600" y="58">Tái tham số hóa: đưa ngẫu nhiên ra ngoài đường học</text>

  <g transform="translate(80,115)">
    <rect x="0" y="0" width="500" height="420" rx="16" fill="#ffebee" stroke="#c62828" stroke-width="4"/>
    <text class="label" x="250" y="42">Lấy mẫu trực tiếp</text>
    <rect x="42" y="118" width="150" height="86" rx="12" fill="#fff" stroke="#90a4ae" stroke-width="2"/>
    <text class="small" x="117" y="154">Bộ mã hóa</text>
    <text class="tiny" x="117" y="180">sinh phân phối</text>
    <rect x="310" y="118" width="150" height="86" rx="12" fill="#fff" stroke="#c62828" stroke-width="3"/>
    <text class="small" x="385" y="154">Lấy mẫu</text>
    <text class="tiny" x="385" y="180">ngẫu nhiên</text>
    <rect x="175" y="275" width="150" height="86" rx="12" fill="#fff" stroke="#ef6c00" stroke-width="3"/>
    <text class="small" x="250" y="311">Bộ giải mã</text>
    <text class="tiny" x="250" y="337">tái tạo ảnh</text>
    <path d="M202 161 L298 161" stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arr)"/>
    <path d="M385 210 L300 265" stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arr)"/>
    <path d="M250 370 C210 400 140 390 115 215" stroke="#c62828" stroke-width="4" fill="none" stroke-dasharray="8 8"/>
    <text class="bad" x="250" y="398">nút lấy mẫu chặn đạo hàm</text>
  </g>

  <g transform="translate(620,115)">
    <rect x="0" y="0" width="500" height="420" rx="16" fill="#e8f5e9" stroke="#2e7d32" stroke-width="4"/>
    <text class="label" x="250" y="42">Tái tham số hóa</text>
    <rect x="42" y="118" width="150" height="86" rx="12" fill="#fff" stroke="#90a4ae" stroke-width="2"/>
    <text class="small" x="117" y="154">Bộ mã hóa</text>
    <text class="tiny" x="117" y="180">tham số phân phối</text>
    <rect x="310" y="70" width="150" height="70" rx="12" fill="#fff" stroke="#2e7d32" stroke-width="3"/>
    <text class="small" x="385" y="100">Nhiễu chuẩn</text>
    <text class="tiny" x="385" y="123">cố định nguồn</text>
    <rect x="310" y="198" width="150" height="86" rx="12" fill="#fff" stroke="#2e7d32" stroke-width="3"/>
    <text class="small" x="385" y="232">Biến đổi</text>
    <text class="tiny" x="385" y="258">khả vi</text>
    <rect x="175" y="330" width="150" height="62" rx="12" fill="#fff" stroke="#ef6c00" stroke-width="3"/>
    <text class="small" x="250" y="368">Bộ giải mã</text>
    <path d="M202 161 L298 235" stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arr)"/>
    <path d="M385 145 L385 186" stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arr)"/>
    <path d="M350 292 L294 320" stroke="#607d8b" stroke-width="4" fill="none" marker-end="url(#arr)"/>
    <path d="M250 402 C180 426 85 355 108 216" stroke="#2e7d32" stroke-width="4" fill="none" marker-end="url(#arr)"/>
    <text class="good" x="250" y="435">đạo hàm đi qua phép biến đổi</text>
  </g>

  <rect x="335" y="575" width="530" height="46" rx="12" fill="#f7f7f7" stroke="#cfd8dc" stroke-width="2"/>
  <text class="small" x="600" y="594">Ý chính: mẫu ngẫu nhiên = tham số bộ mã hóa</text>
  <text class="small" x="600" y="616">+ nhiễu chuẩn bên ngoài.</text>
</svg>
